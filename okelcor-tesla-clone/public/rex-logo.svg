<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <!-- Main badge -->
  <circle cx="100" cy="100" r="94" fill="#2f4ea1" filter="url(#shadow)"/>

  <!-- Decorative inner ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Top eyebrow -->
  <text x="100" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="3">CERTIFIED</text>

  <!-- Top divider -->
  <line x1="52" y1="73" x2="148" y2="73" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- REX main text -->
  <text x="100" y="100" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, Arial, sans-serif" font-size="60" font-weight="900" fill="white" letter-spacing="3">REX</text>

  <!-- Bottom divider -->
  <line x1="52" y1="127" x2="148" y2="127" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Registered Exporter -->
  <text x="100" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-weight="600" fill="rgba(255,255,255,0.8)" letter-spacing="2">REGISTERED EXPORTER</text>

  <!-- EU label -->
  <text x="100" y="156" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.55)" letter-spacing="1.5">EUROPEAN UNION</text>
</svg>
